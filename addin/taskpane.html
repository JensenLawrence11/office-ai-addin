<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Office AI Assistant</title>

  <!-- Office.js SDK — required for all Office Add-ins -->
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>

  <style>
    /* ── Design tokens ─────────────────────────────────────────────────── */
    :root {
      --bg:          #0f1117;
      --surface:     #1a1d27;
      --surface2:    #22263a;
      --border:      #2e3350;
      --accent:      #6c8ef5;
      --accent-dim:  #3a4a8a;
      --accent-glow: rgba(108,142,245,0.18);
      --text:        #e8eaf6;
      --text-muted:  #7b82a8;
      --success:     #4caf88;
      --warn:        #e8a44a;
      --danger:      #e8564a;
      --radius:      10px;
      --radius-sm:   6px;
      --font:        'Segoe UI', system-ui, sans-serif;
      --mono:        'Cascadia Code', 'Consolas', monospace;
    }

    /* ── Reset & base ──────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      line-height: 1.5;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ────────────────────────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px 10px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: -0.3px;
    }

    .logo-icon {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
    }

    .header-actions { display: flex; gap: 6px; }

    .icon-btn {
      background: none; border: none; color: var(--text-muted);
      cursor: pointer; padding: 5px; border-radius: var(--radius-sm);
      font-size: 16px; transition: color .15s, background .15s;
      display: flex; align-items: center;
    }
    .icon-btn:hover { color: var(--text); background: var(--surface2); }
    .icon-btn.active { color: var(--accent); }

    /* ── Tabs ──────────────────────────────────────────────────────────── */
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    .tab {
      flex: 1; padding: 8px 4px;
      background: none; border: none;
      color: var(--text-muted); font-size: 12px;
      cursor: pointer; transition: color .15s;
      border-bottom: 2px solid transparent;
      font-family: var(--font);
    }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .tab:hover:not(.active) { color: var(--text); }

    /* ── Main panels ───────────────────────────────────────────────────── */
    .panels { flex: 1; overflow: hidden; position: relative; }
    .panel { position: absolute; inset: 0; overflow-y: auto; padding: 14px; display: none; flex-direction: column; gap: 12px; }
    .panel.active { display: flex; }

    /* ── Mode toggle ───────────────────────────────────────────────────── */
    .mode-toggle {
      display: flex;
      background: var(--surface2);
      border-radius: var(--radius);
      padding: 3px;
      gap: 3px;
    }

    .mode-btn {
      flex: 1; padding: 6px 8px;
      background: none; border: none;
      border-radius: calc(var(--radius) - 2px);
      color: var(--text-muted); font-size: 12px;
      cursor: pointer; transition: all .15s;
      font-family: var(--font);
      display: flex; align-items: center; justify-content: center; gap: 5px;
    }
    .mode-btn.active {
      background: var(--accent-dim);
      color: var(--accent);
      font-weight: 600;
    }

    /* ── Status dot ────────────────────────────────────────────────────── */
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--text-muted); flex-shrink: 0;
      transition: background .3s;
    }
    .status-dot.ok  { background: var(--success); box-shadow: 0 0 6px var(--success); }
    .status-dot.err { background: var(--danger); }
    .status-dot.busy { background: var(--warn); animation: pulse 1s infinite; }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* ── Context bar ───────────────────────────────────────────────────── */
    .context-bar {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 10px;
      display: flex; align-items: center; gap: 8px;
      font-size: 11px; color: var(--text-muted);
    }
    .context-bar .ctx-label { font-weight: 600; color: var(--text); }

    /* ── Quick actions ─────────────────────────────────────────────────── */
    .quick-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .quick-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      padding: 8px 10px;
      cursor: pointer;
      font-size: 11px;
      font-family: var(--font);
      text-align: left;
      transition: border-color .15s, background .15s;
      line-height: 1.3;
    }
    .quick-btn:hover { border-color: var(--accent); background: var(--accent-glow); }
    .quick-btn .qb-icon { font-size: 14px; display: block; margin-bottom: 3px; }

    /* ── Prompt area ───────────────────────────────────────────────────── */
    .prompt-wrap { display: flex; flex-direction: column; gap: 6px; }

    textarea {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font);
      font-size: 12px;
      line-height: 1.5;
      padding: 10px;
      resize: none;
      width: 100%;
      min-height: 80px;
      transition: border-color .15s;
      outline: none;
    }
    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--text-muted); }

    /* ── Buttons ───────────────────────────────────────────────────────── */
    .btn {
      padding: 9px 14px;
      border-radius: var(--radius-sm);
      border: none; cursor: pointer;
      font-size: 12px; font-family: var(--font);
      font-weight: 600; transition: all .15s;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover { filter: brightness(1.12); }
    .btn-primary:disabled { opacity: .45; cursor: not-allowed; filter: none; }

    .btn-secondary {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { border-color: var(--accent); }

    .btn-row { display: flex; gap: 6px; }
    .btn-row .btn-primary { flex: 1; }

    /* ── Response box ──────────────────────────────────────────────────── */
    .response-box {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px;
      font-size: 12px;
      line-height: 1.65;
      min-height: 60px;
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--text);
      display: none;
    }
    .response-box.visible { display: block; }

    .response-header {
      display: flex; align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .response-label {
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .8px;
      color: var(--text-muted);
    }

    .response-actions { display: flex; gap: 4px; }

    .tiny-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-muted);
      font-size: 10px;
      padding: 2px 6px;
      cursor: pointer;
      font-family: var(--font);
      transition: color .15s, border-color .15s;
    }
    .tiny-btn:hover { color: var(--text); border-color: var(--accent); }

    /* ── Error / info banners ──────────────────────────────────────────── */
    .banner {
      padding: 8px 10px;
      border-radius: var(--radius-sm);
      font-size: 11px;
      display: none;
    }
    .banner.visible { display: block; }
    .banner.error { background: rgba(232,86,74,.12); border: 1px solid rgba(232,86,74,.35); color: #f8a09a; }
    .banner.info  { background: rgba(108,142,245,.1); border: 1px solid var(--accent-dim); color: var(--accent); }

    /* ── Settings panel ────────────────────────────────────────────────── */
    .section-label {
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .8px;
      color: var(--text-muted); margin-bottom: 2px;
    }

    .input-group { display: flex; flex-direction: column; gap: 4px; }

    input, select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: var(--font);
      font-size: 12px;
      padding: 8px 10px;
      width: 100%;
      outline: none;
      transition: border-color .15s;
    }
    input:focus, select:focus { border-color: var(--accent); }
    select option { background: var(--surface2); }

    .models-list {
      display: flex; flex-direction: column; gap: 4px;
      margin-top: 4px;
    }

    .model-chip {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 5px 9px;
      font-size: 11px;
      color: var(--text-muted);
      font-family: var(--mono);
    }

    /* ── Scrollbar ─────────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

    /* ── Loading spinner ───────────────────────────────────────────────── */
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-row {
      display: none; align-items: center;
      color: var(--text-muted); font-size: 12px;
    }
    .loading-row.visible { display: flex; }
  </style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────────────────────── -->
<div class="header">
  <div class="logo">
    <div class="logo-icon">✦</div>
    Office AI
  </div>
  <div class="header-actions">
    <div id="statusDot" class="status-dot" title="Backend status"></div>
    <button class="icon-btn" title="Refresh" onclick="checkBackend()">↻</button>
  </div>
</div>

<!-- ── Tabs ────────────────────────────────────────────────────────────────── -->
<div class="tabs">
  <button class="tab active" onclick="switchTab('chat', this)">💬 Chat</button>
  <button class="tab" onclick="switchTab('tools', this)">⚡ Tools</button>
  <button class="tab" onclick="switchTab('settings', this)">⚙ Settings</button>
</div>

<!-- ── Panels ──────────────────────────────────────────────────────────────── -->
<div class="panels">

  <!-- CHAT PANEL -->
  <div id="panel-chat" class="panel active">

    <!-- Mode toggle -->
    <div class="mode-toggle">
      <button class="mode-btn active" id="modeCloud" onclick="setMode('cloud')">
        ☁️ Cloud AI
      </button>
      <button class="mode-btn" id="modeLocal" onclick="setMode('local')">
        🖥 Local AI
      </button>
    </div>

    <!-- Context bar -->
    <div class="context-bar" id="contextBar">
      <span>📄</span>
      <span><span class="ctx-label">Context:</span> <span id="ctxText">No selection</span></span>
    </div>

    <!-- Prompt -->
    <div class="prompt-wrap">
      <textarea id="promptInput" rows="4"
        placeholder="Ask anything about your document, or just chat…"></textarea>

      <div class="btn-row">
        <button class="btn btn-primary" id="sendBtn" onclick="sendPrompt()">
          Send
        </button>
        <button class="btn btn-secondary" onclick="readSelection()">
          📋 Use Selection
        </button>
      </div>
    </div>

    <!-- Loading -->
    <div class="loading-row" id="loadingRow">
      <div class="spinner"></div> Thinking…
    </div>

    <!-- Error -->
    <div class="banner error" id="errorBanner"></div>

    <!-- Response -->
    <div id="responseWrap" style="display:none; flex-direction:column; gap:6px;">
      <div class="response-header">
        <span class="response-label">Response</span>
        <div class="response-actions">
          <button class="tiny-btn" onclick="copyResponse()">Copy</button>
          <button class="tiny-btn" onclick="insertToDoc()">Insert ↓</button>
          <button class="tiny-btn" onclick="clearResponse()">Clear</button>
        </div>
      </div>
      <div class="response-box visible" id="responseBox"></div>
    </div>

  </div>

  <!-- TOOLS PANEL -->
  <div id="panel-tools" class="panel">
    <p style="color:var(--text-muted); font-size:12px;">
      One-click AI actions on your selected text or document.
    </p>

    <div class="quick-grid">
      <button class="quick-btn" onclick="quickAction('Summarize the selected text concisely.')">
        <span class="qb-icon">📝</span>Summarize
      </button>
      <button class="quick-btn" onclick="quickAction('Fix grammar and spelling in the selected text. Return only the corrected text.')">
        <span class="qb-icon">✅</span>Fix Grammar
      </button>
      <button class="quick-btn" onclick="quickAction('Make the selected text more professional and formal. Return only the rewritten text.')">
        <span class="qb-icon">💼</span>Make Formal
      </button>
      <button class="quick-btn" onclick="quickAction('Simplify the selected text so it is easy to understand. Return only the simplified version.')">
        <span class="qb-icon">🎯</span>Simplify
      </button>
      <button class="quick-btn" onclick="quickAction('Expand the selected text with more detail and explanation. Return only the expanded version.')">
        <span class="qb-icon">🔍</span>Expand
      </button>
      <button class="quick-btn" onclick="quickAction('Translate the selected text to Spanish. Return only the translation.')">
        <span class="qb-icon">🌐</span>Translate
      </button>
      <button class="quick-btn" onclick="quickAction('List the key bullet points from the selected text.')">
        <span class="qb-icon">📌</span>Bullet Points
      </button>
      <button class="quick-btn" onclick="quickAction('Rewrite the selected text in a friendlier, more casual tone. Return only the rewritten version.')">
        <span class="qb-icon">😊</span>Make Casual
      </button>
    </div>

    <div class="loading-row" id="toolsLoadingRow">
      <div class="spinner"></div> Working…
    </div>
    <div class="banner error" id="toolsError"></div>

    <div id="toolsResultWrap" style="display:none; flex-direction:column; gap:6px;">
      <div class="response-header">
        <span class="response-label">Result</span>
        <div class="response-actions">
          <button class="tiny-btn" onclick="copyToolResult()">Copy</button>
          <button class="tiny-btn" onclick="insertToolResult()">Insert ↓</button>
          <button class="tiny-btn" onclick="clearToolResult()">Clear</button>
        </div>
      </div>
      <div class="response-box visible" id="toolsResult"></div>
    </div>
  </div>

  <!-- SETTINGS PANEL -->
  <div id="panel-settings" class="panel">

    <div class="input-group">
      <div class="section-label">AI Provider (Cloud)</div>
      <select id="providerSelect" onchange="onProviderChange()">
        <option value="openai">OpenAI (GPT)</option>
        <option value="anthropic">Anthropic (Claude)</option>
        <option value="gemini">Google Gemini</option>
      </select>
    </div>

    <div class="input-group">
      <div class="section-label">API Key</div>
      <input type="password" id="apiKeyInput" placeholder="Paste your API key here…" />
    </div>

    <div class="input-group">
      <div class="section-label">Cloud Model (optional override)</div>
      <input type="text" id="modelInput" placeholder="e.g. gpt-4o, claude-opus-4-6…" />
    </div>

    <button class="btn btn-primary" onclick="saveSettings()">Save Settings</button>

    <div class="banner info" id="settingsSaved" style="display:none;">
      ✓ Settings saved successfully.
    </div>

    <hr style="border-color:var(--border); margin: 4px 0;" />

    <div class="input-group">
      <div class="section-label">Local AI — Ollama Model</div>
      <input type="text" id="localModelInput" placeholder="e.g. llama3, mistral, gemma…" />
    </div>

    <button class="btn btn-secondary" onclick="loadLocalModels()">
      🔄 Detect Local Models
    </button>

    <div id="modelsList" class="models-list"></div>

    <div class="banner error" id="settingsError"></div>

    <div style="margin-top:auto; padding-top:8px; border-top:1px solid var(--border); color:var(--text-muted); font-size:10px;">
      Backend: <span id="backendUrl">http://localhost:8000</span>
    </div>
  </div>

</div>

<script>
// ── Config ───────────────────────────────────────────────────────────────────
const BACKEND = "http://localhost:8000";
let currentMode = "cloud";
let lastResponse = "";
let lastToolResult = "";

// ── Office.js init ───────────────────────────────────────────────────────────
Office.onReady(function(info) {
  checkBackend();
  loadSettings();
});

// ── Tab switching ─────────────────────────────────────────────────────────────
function switchTab(name, btn) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
  btn.classList.add("active");
  document.getElementById("panel-" + name).classList.add("active");
}

// ── Mode toggle ───────────────────────────────────────────────────────────────
function setMode(mode) {
  currentMode = mode;
  document.getElementById("modeCloud").classList.toggle("active", mode === "cloud");
  document.getElementById("modeLocal").classList.toggle("active", mode === "local");
}

// ── Read selection from Word/Excel/PowerPoint ─────────────────────────────────
async function readSelection() {
  try {
    if (Office.context.host === Office.HostType.Word) {
      await Word.run(async ctx => {
        const sel = ctx.document.getSelection();
        sel.load("text");
        await ctx.sync();
        const text = sel.text.trim();
        document.getElementById("ctxText").textContent = text
          ? text.slice(0, 60) + (text.length > 60 ? "…" : "")
          : "No selection";
        if (text) document.getElementById("promptInput").value = text;
      });
    } else if (Office.context.host === Office.HostType.Excel) {
      await Excel.run(async ctx => {
        const range = ctx.workbook.getSelectedRange();
        range.load("values");
        await ctx.sync();
        const flat = range.values.flat().filter(Boolean).join(", ");
        document.getElementById("ctxText").textContent = flat.slice(0, 60) || "No data";
        if (flat) document.getElementById("promptInput").value = flat;
      });
    } else {
      document.getElementById("ctxText").textContent = "Unsupported host";
    }
  } catch (e) {
    document.getElementById("ctxText").textContent = "Error reading selection";
  }
}

// ── Insert text back into document ───────────────────────────────────────────
async function insertToDoc(text) {
  const content = text || lastResponse;
  if (!content) return;
  try {
    if (Office.context.host === Office.HostType.Word) {
      await Word.run(async ctx => {
        const sel = ctx.document.getSelection();
        sel.insertText(content, "Replace");
        await ctx.sync();
      });
    } else if (Office.context.host === Office.HostType.Excel) {
      await Excel.run(async ctx => {
        const range = ctx.workbook.getSelectedRange();
        range.values = [[content]];
        await ctx.sync();
      });
    }
  } catch (e) {
    showError("Could not insert text: " + e.message, "errorBanner");
  }
}

// ── Send prompt ───────────────────────────────────────────────────────────────
async function sendPrompt() {
  const prompt = document.getElementById("promptInput").value.trim();
  if (!prompt) return;

  setLoading(true);
  hideError("errorBanner");
  document.getElementById("responseWrap").style.display = "none";

  try {
    const data = await callBackend("/ai/generate", {
      prompt,
      mode: currentMode,
    });
    lastResponse = data.result;
    document.getElementById("responseBox").textContent = lastResponse;
    document.getElementById("responseWrap").style.display = "flex";
  } catch (e) {
    showError(e.message, "errorBanner");
  } finally {
    setLoading(false);
  }
}

// ── Quick tool actions ────────────────────────────────────────────────────────
async function quickAction(instruction) {
  document.getElementById("toolsLoadingRow").classList.add("visible");
  document.getElementById("toolsResultWrap").style.display = "none";
  hideError("toolsError");

  let selection = "";
  try {
    if (Office.context.host === Office.HostType.Word) {
      await Word.run(async ctx => {
        const sel = ctx.document.getSelection();
        sel.load("text");
        await ctx.sync();
        selection = sel.text.trim();
      });
    }
  } catch {}

  const prompt = selection
    ? `${instruction}\n\nText:\n${selection}`
    : instruction;

  try {
    const data = await callBackend("/ai/generate", { prompt, mode: currentMode });
    lastToolResult = data.result;
    document.getElementById("toolsResult").textContent = lastToolResult;
    document.getElementById("toolsResultWrap").style.display = "flex";
  } catch (e) {
    showError(e.message, "toolsError");
  } finally {
    document.getElementById("toolsLoadingRow").classList.remove("visible");
  }
}

// ── Settings ──────────────────────────────────────────────────────────────────
function onProviderChange() {
  // Could auto-populate a model placeholder based on provider
}

async function saveSettings() {
  const provider = document.getElementById("providerSelect").value;
  const api_key = document.getElementById("apiKeyInput").value.trim();
  const model = document.getElementById("modelInput").value.trim();

  if (!api_key) {
    showError("Please enter an API key.", "settingsError");
    return;
  }

  try {
    await callBackend("/settings", { provider, api_key, model }, "POST");
    const saved = document.getElementById("settingsSaved");
    saved.style.display = "block";
    setTimeout(() => { saved.style.display = "none"; }, 3000);
    hideError("settingsError");
  } catch (e) {
    showError(e.message, "settingsError");
  }
}

async function loadSettings() {
  try {
    const data = await callBackend("/settings", null, "GET");
    if (data.provider) document.getElementById("providerSelect").value = data.provider;
    if (data.local_model) document.getElementById("localModelInput").value = data.local_model;
  } catch {}
}

async function loadLocalModels() {
  const list = document.getElementById("modelsList");
  list.innerHTML = '<div class="model-chip" style="color:var(--text-muted)">Checking…</div>';
  try {
    const data = await callBackend("/local/models", null, "GET");
    if (data.error) {
      list.innerHTML = `<div class="model-chip" style="color:var(--danger)">${data.error}</div>`;
      return;
    }
    if (!data.models.length) {
      list.innerHTML = '<div class="model-chip" style="color:var(--text-muted)">No models found. Run: ollama pull llama3</div>';
      return;
    }
    list.innerHTML = data.models.map(m =>
      `<div class="model-chip" onclick="document.getElementById('localModelInput').value='${m}'"
            style="cursor:pointer;" title="Click to select">🖥 ${m}</div>`
    ).join("");
  } catch (e) {
    list.innerHTML = `<div class="model-chip" style="color:var(--danger)">Error: ${e.message}</div>`;
  }
}

// ── Backend check ─────────────────────────────────────────────────────────────
async function checkBackend() {
  const dot = document.getElementById("statusDot");
  dot.className = "status-dot busy";
  try {
    const res = await fetch(`${BACKEND}/health`, { signal: AbortSignal.timeout(3000) });
    if (res.ok) { dot.className = "status-dot ok"; return; }
  } catch {}
  dot.className = "status-dot err";
}

// ── Utility helpers ───────────────────────────────────────────────────────────
async function callBackend(path, body, method) {
  method = method || (body ? "POST" : "GET");
  const opts = {
    method,
    headers: { "Content-Type": "application/json" },
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(BACKEND + path, opts);
  const data = await res.json();
  if (!res.ok) throw new Error(data.detail || "Request failed");
  return data;
}

function setLoading(on) {
  document.getElementById("loadingRow").classList.toggle("visible", on);
  document.getElementById("sendBtn").disabled = on;
}

function showError(msg, id) {
  const el = document.getElementById(id);
  el.textContent = "⚠ " + msg;
  el.classList.add("visible");
}
function hideError(id) {
  document.getElementById(id).classList.remove("visible");
}

function copyResponse() {
  navigator.clipboard.writeText(lastResponse).catch(() => {});
}
function clearResponse() {
  document.getElementById("responseWrap").style.display = "none";
  lastResponse = "";
}
function copyToolResult() {
  navigator.clipboard.writeText(lastToolResult).catch(() => {});
}
function insertToolResult() { insertToDoc(lastToolResult); }
function clearToolResult() {
  document.getElementById("toolsResultWrap").style.display = "none";
  lastToolResult = "";
}
</script>
